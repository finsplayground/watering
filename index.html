<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D6E74">
<title>Gartenbewässerung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E7EDE7; --surface:#FDFFFD; --ink:#16241C; --muted:#5E6E63; --line:#CDD8CE;
    --water:#0D6E74; --water-dk:#0A565B; --live:#2FA85F; --live-dk:#238049;
    --tree:#A96A2E; --danger:#B34A3C;
    --shadow:0 1px 2px rgba(22,36,28,.08), 0 6px 20px rgba(22,36,28,.06);
    --sans:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4;padding-bottom:120px}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}

  header{padding:18px 0 8px}
  .eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--water);margin:0 0 2px}
  h1{font-size:24px;font-weight:700;margin:0;letter-spacing:-.01em}

  .tabs{display:flex;gap:6px;margin:14px 0 4px;overflow-x:auto;padding-bottom:2px}
  .tab{flex:1 0 auto;min-height:46px;padding:0 16px;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:12px;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s}
  .tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

  .now{position:sticky;top:0;z-index:30;margin:10px 0;padding:14px 16px;border-radius:16px;background:var(--water);color:#fff;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
  .now.idle{background:var(--surface);color:var(--muted);border:1px dashed var(--line);box-shadow:none}
  .now .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.9;margin:0 0 2px}
  .now .who{font-size:18px;font-weight:700;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .now .col-left{flex:1;min-width:0}
  .now .clock{font-family:var(--mono);font-size:22px;font-weight:600;font-variant-numeric:tabular-nums}
  .live-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--live);margin-right:7px;vertical-align:middle;animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,168,95,.55)}70%{box-shadow:0 0 0 9px rgba(47,168,95,0)}100%{box-shadow:0 0 0 0 rgba(47,168,95,0)}}
  .pause-btn{flex:0 0 auto;min-height:52px;min-width:100px;padding:0 18px;border:none;border-radius:14px;background:#fff;color:var(--water);font-family:var(--sans);font-size:16px;font-weight:700;cursor:pointer}
  .now.paused .pause-btn{background:var(--live);color:#fff}

  .total{display:flex;align-items:baseline;justify-content:space-between;margin:16px 2px 8px}
  .total .k{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .total .v{font-family:var(--mono);font-weight:600;font-size:30px;font-variant-numeric:tabular-nums;color:var(--water)}
  .total .v small{font-size:16px;color:var(--muted);font-weight:500}

  .list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .plant{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .plant .main{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;padding:16px;cursor:pointer;font-family:var(--sans);color:inherit;min-height:66px}
  .plant .name{flex:1;min-width:0;font-size:17px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:8px}
  .plant .baum{flex:0 0 auto;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tree);border:1px solid var(--tree);border-radius:6px;padding:2px 6px;font-weight:600}
  .plant.tree .name{color:var(--tree)}
  .plant .readout{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;padding-right:26px}
  .plant .readout .l{font-size:19px;font-weight:600}
  .plant .readout .t{font-size:12px;color:var(--muted)}
  .plant .go{flex:0 0 auto;width:14px;height:14px;border-radius:50%;border:2px solid var(--line)}
  .plant.tree .go{border-color:var(--tree)}
  .plant.active{border-color:var(--live);box-shadow:0 0 0 2px rgba(47,168,95,.25),var(--shadow)}
  .plant.active .go{border-color:var(--live);background:var(--live)}
  .plant.active .readout .l{color:var(--live-dk)}
  .plant.active.watering::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background-size:100% 22px;background-image:linear-gradient(180deg,var(--live) 0,var(--live-dk) 50%,var(--live) 100%);animation:flow 1.4s linear infinite}
  @keyframes flow{from{background-position:0 0}to{background-position:0 22px}}
  .plant.dead{opacity:.5}
  .plant.dead .name{text-decoration:line-through;text-decoration-color:var(--muted)}

  .edit-row{display:none;gap:8px;align-items:center;padding:0 16px 14px;flex-wrap:wrap}
  .plant.editing .edit-row{display:flex}
  .edit-row input{width:96px;min-height:46px;padding:0 10px;border:1px solid var(--line);border-radius:10px;font-family:var(--mono);font-size:16px;background:#fff;color:var(--ink)}
  .edit-row .hint{font-size:13px;color:var(--muted);flex:1;min-width:130px}
  .chip{min-height:46px;padding:0 14px;border:1px solid var(--line);background:#fff;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);cursor:pointer}
  .chip.ghost{color:var(--danger);border-color:#e4c4bf}
  .plant .pencil{position:absolute;top:10px;right:12px;width:34px;height:34px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;border-radius:8px}
  .plant .pencil:hover{background:var(--bg)}

  .panel{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .panel > summary{list-style:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px}
  .panel > summary::-webkit-details-marker{display:none}
  .panel > summary .cal{font-family:var(--mono);color:var(--water);font-size:14px}
  .panel .body{padding:4px 16px 18px;border-top:1px solid var(--line)}
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
  .field .inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:16px}
  .field input[type=number]{min-height:50px;padding:0 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:var(--mono);font-size:17px;color:var(--ink);max-width:96px;text-align:center}
  .rate{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:10px}

  .actions{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(231,237,231,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
  .actions .row{max-width:560px;margin:0 auto;display:flex;gap:10px}
  .btn{min-height:52px;padding:0 16px;border-radius:12px;border:1px solid var(--line);background:#fff;font-family:var(--sans);font-weight:600;font-size:15px;color:var(--ink);cursor:pointer}
  .actions .btn{flex:1}
  .actions .report{background:var(--water);border-color:var(--water);color:#fff}
  .actions .reset{color:var(--danger);border-color:#e4c4bf}

  .toast{position:fixed;left:50%;bottom:98px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.22s;z-index:60;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){.live-dot,.plant.active.watering::before{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Gartenbewässerung</p>
    <h1>Bewässerung</h1>
  </header>

  <div class="tabs" id="tabs" role="tablist" aria-label="Bereiche"></div>

  <div class="now idle" id="now">
    <div class="col-left">
      <p class="lbl" id="nowLbl">Nichts wird bewässert</p>
      <div class="who" id="nowWho">Pflanze antippen zum Starten</div>
    </div>
    <div class="clock" id="nowClock" style="display:none">0:00</div>
    <button class="pause-btn" id="pauseBtn" style="display:none">Pause</button>
  </div>

  <div class="total">
    <span class="k">Sitzung gesamt</span>
    <span class="v" id="totalV">0,00 <small>L</small></span>
  </div>

  <div class="list" id="list"></div>

  <details class="panel" id="setupPanel">
    <summary>
      <span>Kalibrierung</span>
      <span class="cal" id="calSummary">10 L / 40 s</span>
    </summary>
    <div class="body">
      <div class="field">
        <label>Füllzeit beim aktuellen Wasserdruck</label>
        <div class="inline">
          <input type="number" id="fillLiters" min="0.1" step="0.5" inputmode="decimal"> L in
          <input type="number" id="fillSeconds" min="1" step="1" inputmode="numeric"> Sekunden
        </div>
        <div class="rate" id="rateNote"></div>
      </div>
    </div>
  </details>
</div>

<div class="actions">
  <div class="row">
    <button class="btn report" id="downloadBtn">Bericht herunterladen</button>
    <button class="btn reset" id="resetBtn">Neue Sitzung</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const K_CFG="gw_config_v2", K_SES="gw_session_v2";

/* Fixed garden. Stable ids so saved amounts always map back after a reload. */
const SECTIONS=[
  {id:"vorne",name:"Vorne",plants:[
    {id:"v01",name:"Schneeball"},
    {id:"v02",name:"Strauch-Kronwicke (R)"},
    {id:"v03",name:"Bauernjasmin"},
    {id:"v04",name:"Hundsrose"},
    {id:"v05",name:"Kornelkirsche"},
    {id:"v06",name:"Blaue Heckenkirsche"},
    {id:"v07",name:"Felsenbirne"},
    {id:"v08",name:"Liguster"},
    {id:"v09",name:"Keilblättrige Rose"},
    {id:"v10",name:"Berberitze"},
    {id:"v11",name:"Pimpernuss"},
    {id:"v12",name:"Fingerstrauch"},
    {id:"v13",name:"Zwergmandel"},
    {id:"v14",name:"Besenginster"},
    {id:"v15",name:"Strauch-Kronwicke (L)"},
    {id:"v16",name:"Gold-Johannisbeere"},
    {id:"v17",name:"Eberesche (V)",tree:true}
  ]},
  {id:"seite",name:"Seite",plants:[
    {id:"s01",name:"Schwarze Johannisbeere"},
    {id:"s02",name:"Zimtrose"},
    {id:"s03",name:"Rote Johannisbeere"},
    {id:"s04",name:"Jostabeere (tot)",dead:true},
    {id:"s05",name:"Wilde Johannisbeere"},
    {id:"s06",name:"Berberitze"},
    {id:"s07",name:"Apfelbeere"},
    {id:"s08",name:"Eberesche (S)",tree:true}
  ]},
  {id:"hinten",name:"Hinten",plants:[
    {id:"h01",name:"Wilde Johannisbeere"},
    {id:"h02",name:"Faulbaum"},
    {id:"h03",name:"Weißdorn"},
    {id:"h04",name:"Pfaffenhüttchen"},
    {id:"h05",name:"Stachelbeere"},
    {id:"h06",name:"Blaubeere"},
    {id:"h07",name:"Kirsche",tree:true}
  ]}
];

function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function defaultSession(){return {amounts:{},activeId:null,running:false,activeSince:null,date:todayStr()};}

let cfg=load(K_CFG)||{fillLiters:10,fillSeconds:40};
let ses=load(K_SES)||defaultSession();
let currentSectionId=SECTIONS[0].id;
let editingPlant=null;

function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function saveCfg(){try{localStorage.setItem(K_CFG,JSON.stringify(cfg));}catch(e){}}
function saveSes(){try{localStorage.setItem(K_SES,JSON.stringify(ses));}catch(e){}}

const flowRate=()=>(cfg.fillLiters>0&&cfg.fillSeconds>0)?(cfg.fillLiters/cfg.fillSeconds):0;
function plantById(id){for(const s of SECTIONS)for(const p of s.plants)if(p.id===id)return{plant:p,section:s};return null;}

function plantSeconds(id){let s=ses.amounts[id]||0;if(ses.activeId===id&&ses.running&&ses.activeSince)s+=(Date.now()-ses.activeSince)/1000;return s;}
function plantLiters(id){return plantSeconds(id)*flowRate();}

function commit(){if(ses.activeId!=null&&ses.running&&ses.activeSince){ses.amounts[ses.activeId]=(ses.amounts[ses.activeId]||0)+(Date.now()-ses.activeSince)/1000;ses.activeSince=Date.now();}}
function setActive(id){if(ses.activeId===id&&ses.running)return;commit();ses.activeId=id;ses.running=true;ses.activeSince=Date.now();saveSes();requestWakeLock();render();}
function togglePause(){if(ses.activeId==null)return;if(ses.running){commit();ses.running=false;ses.activeSince=null;releaseWakeLock();}else{ses.running=true;ses.activeSince=Date.now();requestWakeLock();}saveSes();render();}

function fmtTime(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60);const s=sec%60;return m+":"+String(s).padStart(2,"0");}
function fmtL(l){return (Math.round(l*100)/100).toFixed(2).replace(".",",");}
function fmtRate(r){return (Math.round(r*1000)/1000).toString().replace(".",",");}

function render(){renderTabs();renderNow();renderList();renderTotal();renderCalSummary();}

function renderTabs(){
  const t=document.getElementById("tabs");t.innerHTML="";
  SECTIONS.forEach(s=>{
    const b=document.createElement("button");
    b.className="tab";b.textContent=s.name;b.setAttribute("role","tab");
    b.setAttribute("aria-selected",s.id===currentSectionId?"true":"false");
    b.onclick=()=>{currentSectionId=s.id;render();};
    t.appendChild(b);
  });
}
function renderNow(){
  const now=document.getElementById("now");
  const lbl=document.getElementById("nowLbl"),who=document.getElementById("nowWho");
  const clock=document.getElementById("nowClock"),btn=document.getElementById("pauseBtn");
  if(ses.activeId==null){now.className="now idle";lbl.textContent="Nichts wird bewässert";who.textContent="Pflanze antippen zum Starten";clock.style.display="none";btn.style.display="none";return;}
  const info=plantById(ses.activeId);
  const nm=info?info.plant.name:"(entfernt)";
  const secName=info?info.section.name:"";
  now.className="now"+(ses.running?"":" paused");
  const state=ses.running?"Wird bewässert":"Pausiert";
  lbl.innerHTML=(ses.running?'<span class="live-dot"></span>':'')+state+(secName?" · "+secName:"");
  who.textContent=nm;
  clock.style.display="";clock.textContent=fmtTime(plantSeconds(ses.activeId));
  btn.style.display="";btn.textContent=ses.running?"Pause":"Weiter";
}
function renderTotal(){let tot=0;for(const s of SECTIONS)for(const p of s.plants)tot+=plantLiters(p.id);document.getElementById("totalV").innerHTML=fmtL(tot)+' <small>L</small>';}
function renderList(){
  const list=document.getElementById("list");list.innerHTML="";
  const sec=SECTIONS.find(s=>s.id===currentSectionId);
  sec.plants.forEach(p=>{
    const isActive=ses.activeId===p.id;
    const card=document.createElement("div");
    card.className="plant"+(isActive?" active":"")+(isActive&&ses.running?" watering":"")+(editingPlant===p.id?" editing":"")+(p.tree?" tree":"")+(p.dead?" dead":"");

    const main=document.createElement("button");
    main.className="main";
    main.innerHTML=
      '<span class="name">'+escapeHtml(p.name)+(p.tree?'<span class="baum">Baum</span>':'')+'</span>'+
      '<span class="readout"><div class="l">'+fmtL(plantLiters(p.id))+' L</div><div class="t">'+fmtTime(plantSeconds(p.id))+'</div></span>'+
      '<span class="go"></span>';
    main.onclick=()=>setActive(p.id);
    card.appendChild(main);

    const pencil=document.createElement("button");
    pencil.className="pencil";pencil.title="Anpassen";pencil.textContent="✎";
    pencil.onclick=(e)=>{e.stopPropagation();editingPlant=editingPlant===p.id?null:p.id;render();};
    card.appendChild(pencil);

    const edit=document.createElement("div");edit.className="edit-row";
    edit.innerHTML='<span class="hint">Diese Pflanze setzen auf</span>';
    const inp=document.createElement("input");inp.type="number";inp.min="0";inp.step="0.1";inp.inputMode="decimal";inp.value=fmtL(plantLiters(p.id)).replace(",",".");
    const setBtn=document.createElement("button");setBtn.className="chip";setBtn.textContent="L setzen";
    setBtn.onclick=()=>{const liters=parseFloat(inp.value);if(!isNaN(liters)&&flowRate()>0){if(ses.activeId===p.id&&ses.running)commit();ses.amounts[p.id]=Math.max(0,liters)/flowRate();if(ses.activeId===p.id&&ses.running)ses.activeSince=Date.now();editingPlant=null;saveSes();render();toast(p.name+" auf "+fmtL(Math.max(0,liters))+" L gesetzt");}};
    const clr=document.createElement("button");clr.className="chip ghost";clr.textContent="Löschen";
    clr.onclick=()=>{if(ses.activeId===p.id){ses.activeId=null;ses.running=false;ses.activeSince=null;releaseWakeLock();}delete ses.amounts[p.id];editingPlant=null;saveSes();render();toast(p.name+" gelöscht");};
    edit.appendChild(inp);edit.appendChild(setBtn);edit.appendChild(clr);
    card.appendChild(edit);

    list.appendChild(card);
  });
}
function renderCalSummary(){
  document.getElementById("calSummary").textContent=fmtRate(cfg.fillLiters)+" L / "+cfg.fillSeconds+" s";
  const r=flowRate();
  document.getElementById("rateNote").textContent=r>0?("= "+fmtRate(r)+" L pro Sekunde. Damit werden alle Mengen berechnet."):"Beide Werte eingeben, um die Rate zu berechnen.";
}

function downloadReport(){
  const rate=flowRate();
  const rows=[["Datum","Bereich","Pflanze","Liter","Bewässerungszeit (m:ss)"]];
  let any=false,total=0;
  SECTIONS.forEach(sec=>{sec.plants.forEach(p=>{const secs=plantSeconds(p.id);if(secs>0.5){const l=secs*rate;total+=l;any=true;rows.push([ses.date,sec.name,p.name,fmtL(l),fmtTime(secs)]);}});});
  if(!any){toast("Noch nichts bewässert – kein Bericht vorhanden.");return;}
  rows.push([]);rows.push([ses.date,"","GESAMT",fmtL(total),""]);
  const csv=rows.map(r=>r.map(csvCell).join(";")).join("\r\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="bewaesserung-"+ses.date+".csv";
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("Bericht heruntergeladen");
}
function csvCell(v){v=String(v==null?"":v);return /[";\r\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}

function resetSession(){
  let watered=false;for(const k in ses.amounts){if(ses.amounts[k]>0.5){watered=true;break;}}
  const msg=watered?"Neue Sitzung starten? Alle Bewässerungsmengen werden gelöscht. Lade vorher den Bericht herunter, falls du ihn brauchst.":"Neue Sitzung starten?";
  if(!confirm(msg))return;
  releaseWakeLock();ses=defaultSession();saveSes();editingPlant=null;render();toast("Neue Sitzung gestartet");
}

let wakeLock=null;
async function requestWakeLock(){try{if("wakeLock" in navigator&&ses.running){wakeLock=await navigator.wakeLock.request("screen");}}catch(e){}}
function releaseWakeLock(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&ses.running)requestWakeLock();});

let toastTimer;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2200);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

document.getElementById("pauseBtn").onclick=togglePause;
document.getElementById("downloadBtn").onclick=downloadReport;
document.getElementById("resetBtn").onclick=resetSession;

const fl=document.getElementById("fillLiters"),fs=document.getElementById("fillSeconds");
fl.value=cfg.fillLiters;fs.value=cfg.fillSeconds;
fl.oninput=()=>{const v=parseFloat(fl.value);if(!isNaN(v)&&v>0){cfg.fillLiters=v;saveCfg();render();}};
fs.oninput=()=>{const v=parseFloat(fs.value);if(!isNaN(v)&&v>0){cfg.fillSeconds=v;saveCfg();render();}};

setInterval(()=>{if(ses.running){renderNow();renderList();renderTotal();}},300);

render();
</script>
</body>
</html>
